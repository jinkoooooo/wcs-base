<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cargo/Pallet box (top-down view) - uses currentColor for CSS styling -->

  <!-- Main box body -->
  <rect x="10" y="10" width="80" height="80" rx="6"
        fill="currentColor" opacity="0.9"/>

  <!-- Box top highlight -->
  <rect x="15" y="15" width="70" height="70" rx="4"
        fill="#ffffff" opacity="0.15"/>

  <!-- Cross strapping (pallet tape) -->
  <rect x="45" y="10" width="10" height="80" rx="1"
        fill="#ffffff" opacity="0.25"/>
  <rect x="10" y="45" width="80" height="10" rx="1"
        fill="#ffffff" opacity="0.25"/>

  <!-- Center label area -->
  <rect x="35" y="35" width="30" height="30" rx="3"
        fill="#ffffff" opacity="0.2"/>
</svg>
