<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none" shape-rendering="geometricPrecision">
  <!-- Lifter (top-down) - 100x100 snug, cargo overlays on the inner slot -->

  <!-- Outer frame: stroke fits exactly inside viewBox (no clipping) -->
  <rect x="3" y="3" width="94" height="94" rx="18"
        fill="none" stroke="#2F3947" stroke-width="6"
        opacity="0.80" stroke-linejoin="round"/>

  <!-- Top motor/header (strong) -->
  <rect x="28" y="6" width="44" height="10" rx="5"
        fill="#2F3947" opacity="0.55"/>

  <!-- Motor bolts -->
  <g fill="#58667A" opacity="0.80">
    <circle cx="32" cy="11" r="2"/>
    <circle cx="68" cy="11" r="2"/>
  </g>

  <!-- Bottom pit/alignment (strong) -->
  <rect x="30" y="84" width="40" height="10" rx="5"
        fill="#2F3947" opacity="0.42"/>
  <rect x="36" y="88" width="28" height="2" rx="1"
        fill="#58667A" opacity="0.55"/>

  <!-- Cargo slot base (subtle; cargo icon will be drawn on top later) -->
  <rect x="16" y="18" width="68" height="64" rx="8"
        fill="#2F3947" opacity="0.08"/>

  <!-- Side rails (stronger than Rack) -->
  <rect x="16" y="18" width="10" height="64" rx="5"
        fill="#2F3947" opacity="0.50"/>
  <rect x="74" y="18" width="10" height="64" rx="5"
        fill="#2F3947" opacity="0.50"/>

  <!-- Rail highlights -->
  <rect x="19" y="22" width="4" height="56" rx="2"
        fill="#8FA3BA" opacity="0.32"/>
  <rect x="77" y="22" width="4" height="56" rx="2"
        fill="#8FA3BA" opacity="0.32"/>

  <!-- Inner guide (very subtle) -->
  <rect x="49" y="20" width="2" height="60" rx="1"
        fill="#58667A" opacity="0.12"/>

  <!-- Center guide dot -->
  <circle cx="50" cy="50" r="2" fill="#8FA3BA" opacity="0.10"/>
</svg>
